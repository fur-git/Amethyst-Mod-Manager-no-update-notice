# Tkinter support for Flatpak (from Inkscape's working Flathub manifest)
# https://github.com/flathub/org.inkscape.Inkscape/blob/master/python3-tkinter.yaml
#
# Pinned to Tcl/Tk 8.6 — Tk 9 has UI scaling regressions that break our scaled() helpers.
name: tkinter
buildsystem: simple
build-commands:
  # tkinter-standalone's pyproject.toml hardcodes Tk 9 lib names; rewrite for 8.6.
  - sed -i 's/"tcl9.0", "tcl9tk9.0"/"tcl8.6", "tk8.6"/' pyproject.toml
  - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
sources:
  - type: git
    url: https://github.com/iwalton3/tkinter-standalone
    commit: 8e78e38ef0cceb44a3a0062e1c314a4ff3f981db
modules:
  - name: tcl
    buildsystem: autotools
    subdir: unix
    post-install:
      - chmod 755 /app/lib/libtcl8.6.so
    cleanup:
      - /bin
      - /lib/pkgconfig
      - /man
    sources:
      - type: archive
        url: https://prdownloads.sourceforge.net/tcl/tcl8.6.14-src.tar.gz
        sha256: 5880225babf7954c58d4fb0f5cf6279104ce1cd6aa9b71e9a6322540e1c4de66
  - name: tk
    buildsystem: autotools
    subdir: unix
    post-install:
      - chmod 755 /app/lib/libtk8.6.so
    cleanup:
      - /bin
      - /lib/pkgconfig
      - /man
    sources:
      - type: archive
        url: https://prdownloads.sourceforge.net/tcl/tk8.6.14-src.tar.gz
        sha256: 8ffdb720f47a6ca6107eac2dd877e30b0ef7fac14f3a84ebbd0b3612cee41a94
